services:
  postgres:
    image: postgres:16-alpine
    container_name: campass-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: campass
      POSTGRES_PASSWORD: campass
      POSTGRES_DB: campass
    ports:
      - "5432:5432"
    volumes:
      - campass_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campass -d campass"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  campass_postgres_data:
