name: FestIDMobile

options:
  bundleIdPrefix: com.festid
  deploymentTarget:
    iOS: "18.0"
  developmentLanguage: ko

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: 6.0
    IPHONEOS_DEPLOYMENT_TARGET: 18.0
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1

targets:
  FestIDMobile:
    type: application
    platform: iOS
    sources:
      - path: Sources/FestIDMobile
    resources:
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.festid.mobile
        PRODUCT_NAME: FestID
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: FestID
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES

schemes:
  FestIDMobile:
    build:
      targets:
        FestIDMobile: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release
